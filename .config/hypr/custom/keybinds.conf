# You can put your preferred keybinds here
# https://wiki.hyprland.org/Configuring/Binds/

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

bind = Shift+Super, v, layoutmsg, togglesplit
bind = Super, W, exec, floorp 
bind = Super, D, exec, discord

bind = Ctrl+Shift+Alt+Super, Right,  movecurrentworkspacetomonitor, r
bind = Ctrl+Shift+Alt+Super, Left,  movecurrentworkspacetomonitor, l

bind = Shift+Super, P, exec, pavucontrol # Launch pavucontrol (volume mixer)
bind = Shift+Super, Escape, exec, plasma-systemmonitor # Launch plasma System monitor
