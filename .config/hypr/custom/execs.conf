# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing

exec-once=jamesdsp -t

exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = /usr/bin/kwalletd6
exec-once=/usr/lib/pam_kwallet_init

exec-once=protonmail-bridge --no-window
exec-once=thunderbird
exec-once=signal-desktop --use-tray-icon --enable-ozone --ozone-platform=wayland --password-store="kwallet6"
exec-once=discord --enable-ozone --ozone-platform=wayland

exec-once=hyprctl setcursor Catppuccin-Macchiato-Dark 24
